<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padmark{{if .EditMode}} — Edit{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?p={{styleVersion}}">
</head>
<body>
<div class="wrapper">

    {{template "header"}}

    <div class="editor-container">
        <div class="editor-toolbar">
            <span class="toolbar-label">Markdown</span>
            <div class="toolbar-actions">
                <button class="toolbar-btn" id="mdBold">B</button>
                <button class="toolbar-btn" id="mdItalic" style="font-style:italic">I</button>
                <button class="toolbar-btn" id="mdCode">&lt;/&gt;</button>
                <button class="toolbar-btn" id="mdBlock">block</button>
            </div>
        </div>
        <textarea class="editor-textarea" id="editor" placeholder="Paste or write your Markdown…" spellcheck="false">{{.Content}}</textarea>
        <div class="editor-footer">
            <span class="char-count" id="charCount">0 characters</span>
            <span class="format-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Markdown supported
            </span>
        </div>
    </div>

    <div class="options-row">
        <div class="field-group">
            <label class="field-label">Title <span class="optional">· shown in the header</span></label>
            <input type="text" class="field-input" placeholder="My snippet" id="titleInput" value="{{.Title}}">
        </div>
        {{if .EditMode}}
        <div class="field-group">
            <label class="field-label">Edit code <span class="optional">· required</span></label>
            <input type="text" class="field-input" placeholder="Paste your edit code" id="editCodeInput">
        </div>
        {{else}}
        <div class="field-group">
            <label class="field-label">Slug <span class="optional">· optional</span></label>
            <input type="text" class="field-input" placeholder="my-snippet" id="slugInput"
                   pattern="[a-zA-Z0-9_-]+" title="Letters, numbers, hyphens and underscores only">
        </div>
        {{end}}
    </div>

    <div class="options-row note-flags-row">
        <div class="burn-row">
            <label class="burn-checkbox" id="burnLabel">
                <input type="checkbox" id="burnCheck"{{if .BurnAfterReading}} checked{{end}}>
                <span class="checkmark"></span>
                <span class="burn-text">Burn after reading in</span>
            </label>
            <div class="burn-time-wrap{{if .BurnAfterReading}} active{{end}}" id="burnTimeWrap">
                <div class="select-wrap">
                    <select class="field-select burn-select" id="burnTime"{{if not .BurnAfterReading}} disabled{{end}}>
                        <option value="300"{{if eq .TTL 300}} selected{{end}}>5 minutes</option>
                        <option value="600"{{if eq .TTL 600}} selected{{end}}>10 minutes</option>
                        <option value="1800"{{if eq .TTL 1800}} selected{{end}}>30 minutes</option>
                        <option value="3600"{{if or (eq .TTL 3600) (eq .TTL 0)}} selected{{end}}>1 hour</option>
                        <option value="14400"{{if eq .TTL 14400}} selected{{end}}>4 hours</option>
                        <option value="43200"{{if eq .TTL 43200}} selected{{end}}>12 hours</option>
                        <option value="86400"{{if eq .TTL 86400}} selected{{end}}>24 hours</option>
                        <option value="259200"{{if eq .TTL 259200}} selected{{end}}>3 days</option>
                        <option value="604800"{{if eq .TTL 604800}} selected{{end}}>7 days</option>
                        <option value="2592000"{{if eq .TTL 2592000}} selected{{end}}>30 days</option>
                        <option value="7776000"{{if eq .TTL 7776000}} selected{{end}}>90 days</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="burn-row private-row">
            <label class="burn-checkbox" id="privateLabel">
                <input type="checkbox" id="privateCheck"{{if .Private}} checked{{end}}>
                <span class="checkmark"></span>
                <span class="burn-text">Private note</span>
            </label>
            <span class="shortcut-hint">Requires server auth token to view</span>
        </div>
    </div>

    <div class="publish-row">
        <button class="btn-publish" id="submitBtn">{{if .EditMode}}Save{{else}}Publish{{end}}</button>
        <span class="shortcut-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd></span>
    </div>

</div>

<script nonce="{{.Nonce}}">
    const editMode = {{.EditMode}};
    const noteID = {{.ID | js}};

    function updateCount() {
        const len = document.getElementById('editor').value.length;
        document.getElementById('charCount').textContent = len + ' character' + (len === 1 ? '' : 's');
    }
    updateCount();

    {{template "theme-js"}}

    function insertMd(before, after) {
        const ta = document.getElementById('editor');
        const start = ta.selectionStart, end = ta.selectionEnd;
        const sel = ta.value.substring(start, end);
        ta.setRangeText(before + sel + after, start, end, 'select');
        ta.focus();
        updateCount();
    }

    function showError(btn, label, msg) {
        btn.textContent = msg;
        btn.style.background = '#ef4444';
        setTimeout(() => { btn.textContent = label; btn.style.background = ''; }, 1800);
    }

    function toggleBurn() {
        const checked = document.getElementById('burnCheck').checked;
        const wrap = document.getElementById('burnTimeWrap');
        const sel = document.getElementById('burnTime');
        wrap.classList.toggle('active', checked);
        sel.disabled = !checked;
    }

    function getPrivate() {
        return document.getElementById('privateCheck').checked;
    }

    function getTTL() {
        if (!document.getElementById('burnCheck').checked) return 0;
        return parseInt(document.getElementById('burnTime').value);
    }

    async function publish() {
        const btn = document.getElementById('submitBtn');
        const content = document.getElementById('editor').value.trim();
        const titleInput = document.getElementById('titleInput').value.trim();
        const slug = document.getElementById('slugInput').value.trim();
        const burnAfterReading = document.getElementById('burnCheck').checked;
        const ttl = getTTL();

        if (!content) { showError(btn, 'Publish', 'Enter some text first'); return; }

        let title = titleInput;
        if (!title) {
            title = content.split('\n').map(l => l.replace(/^#+\s*/, '').trim()).find(l => l.length > 0) || 'Untitled';
        }

        btn.textContent = 'Publishing…';
        btn.style.opacity = '0.7';
        btn.disabled = true;

        const privateNote = getPrivate();
        const payload = { title, content, burn_after_reading: burnAfterReading, private: privateNote };
        if (slug) payload.slug = slug;
        if (ttl > 0) payload.ttl = ttl;

        try {
            const resp = await fetch('/notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!resp.ok) { throw new Error('HTTP ' + resp.status); }

            const note = await resp.json();
            if (note.edit_code) {
                sessionStorage.setItem('padmark_edit_' + note.id, note.edit_code);
            }
            const params = new URLSearchParams({ id: note.id });
            if (note.burn_after_reading) params.set('burn', '1');
            if (note.expires_at) params.set('expires', note.expires_at);
            window.location.href = '/success?' + params.toString();
        } catch (err) {
            btn.textContent = 'Error — try again';
            btn.style.background = '#ef4444';
            btn.style.opacity = '1';
            btn.disabled = false;
            setTimeout(() => { btn.textContent = 'Publish'; btn.style.background = ''; }, 2500);
        }
    }

    async function save() {
        const btn = document.getElementById('submitBtn');
        const content = document.getElementById('editor').value.trim();
        const title = document.getElementById('titleInput').value.trim();
        const editCode = document.getElementById('editCodeInput').value.trim();
        const ttl = getTTL();

        if (!content) { showError(btn, 'Save', 'Enter some text first'); return; }
        if (!editCode) { showError(btn, 'Save', 'Edit code required'); return; }

        btn.textContent = 'Saving…';
        btn.style.opacity = '0.7';
        btn.disabled = true;

        const burn = document.getElementById('burnCheck').checked;
        const privateNote = getPrivate();
        const payload = { title: title || 'Untitled', content, edit_code: editCode, burn_after_reading: burn, private: privateNote };
        if (ttl > 0) payload.ttl = ttl;

        try {
            const resp = await fetch('/notes/' + noteID, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.status === 403) { throw new Error('Invalid edit code'); }
            if (!resp.ok) { throw new Error('HTTP ' + resp.status); }

            window.location.href = '/' + noteID;
        } catch (err) {
            btn.textContent = err.message || 'Error — try again';
            btn.style.background = '#ef4444';
            btn.style.opacity = '1';
            btn.disabled = false;
            setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 2500);
        }
    }

    document.getElementById('editor').addEventListener('input', updateCount);
    document.getElementById('burnCheck').addEventListener('change', toggleBurn);
    document.getElementById('submitBtn').addEventListener('click', editMode ? save : publish);
    document.getElementById('mdBold').addEventListener('click', () => insertMd('**', '**'));
    document.getElementById('mdItalic').addEventListener('click', () => insertMd('_', '_'));
    document.getElementById('mdCode').addEventListener('click', () => insertMd('`', '`'));
    document.getElementById('mdBlock').addEventListener('click', () => insertMd('\n```\n', '\n```\n'));

    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            editMode ? save() : publish();
        }
    });
</script>
</body>
</html>
