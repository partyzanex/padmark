<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padmark — Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?p={{styleVersion}}">
    <style nonce="{{.Nonce}}">
        .login-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            animation: fade-up 0.5s ease both;
        }
        .login-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .login-desc {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .login-error {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--err-red);
            margin-bottom: 16px;
        }
        .login-success {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--accent);
            margin-bottom: 16px;
        }
        .login-btn {
            width: 100%;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="wrapper wrapper--centered">

    {{template "header"}}

    <div class="login-center">
        <div class="login-card">
            <div class="login-title">Change password</div>
            <div class="login-desc">Min 12 chars — upper, lower, digit, special character required.</div>

            {{if .Error}}
            <div class="login-error">{{.Error}}</div>
            {{end}}

            {{if .Success}}
            <div class="login-success">Password changed successfully.</div>
            {{end}}

            <form method="POST" action="/change-password">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <div class="field-group">
                    <label class="field-label" for="old_password">Current password</label>
                    <input type="password" class="field-input" name="old_password" id="old_password"
                           placeholder="Current password" autofocus required autocomplete="current-password">
                </div>
                <div class="field-group" style="margin-top:12px;">
                    <label class="field-label" for="new_password">New password</label>
                    <input type="password" class="field-input" name="new_password" id="new_password"
                           placeholder="New password" required autocomplete="new-password">
                </div>
                <div class="field-group" style="margin-top:12px;">
                    <label class="field-label" for="new_password_confirm">Confirm new password</label>
                    <input type="password" class="field-input" name="new_password_confirm" id="new_password_confirm"
                           placeholder="Repeat new password" required autocomplete="new-password">
                </div>
                <div class="field-group" style="margin-top:12px;">
                    <label class="field-label" for="totp_code">Authenticator code</label>
                    <input type="text" class="field-input" name="totp_code" id="totp_code"
                           placeholder="6-digit code" required autocomplete="one-time-code"
                           inputmode="numeric" pattern="[0-9]{6}" maxlength="6">
                </div>
                <button type="submit" class="btn-publish login-btn">Change password</button>
            </form>
        </div>
    </div>

</div>

<script nonce="{{.Nonce}}">
    {{template "theme-js"}}
</script>
<script src="/static/password-toggle.js" defer></script>
</body>
</html>
