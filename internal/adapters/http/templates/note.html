<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #222;
      background: #fff;
    }

    h1, h2, h3, h4, h5, h6 {
      line-height: 1.3;
      margin: 1.5em 0 0.5em;
      font-weight: 600;
    }
    h1 { font-size: 2rem; border-bottom: 2px solid #e0e0e0; padding-bottom: .3em; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: .2em; }

    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    p { margin: 0 0 1em; }

    pre {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 1em;
      overflow-x: auto;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: .875em;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 3px;
      padding: .15em .4em;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    blockquote {
      margin: 0 0 1em;
      padding: .5em 1em;
      border-left: 4px solid #d0d7de;
      color: #57606a;
    }
    blockquote > *:last-child { margin-bottom: 0; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 1em;
    }
    th, td {
      border: 1px solid #d0d7de;
      padding: .4em .8em;
      text-align: left;
    }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #f6f8fa; }

    img { max-width: 100%; height: auto; }

    hr { border: none; border-top: 1px solid #d0d7de; margin: 2em 0; }
  </style>
</head>
<body>
{{.Body}}
</body>
</html>
