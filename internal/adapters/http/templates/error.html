<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padmark — {{.Code}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <style nonce="{{.Nonce}}">
        body::before { background: radial-gradient(circle, rgba(248,113,113,0.04) 0%, transparent 70%); }
        .wrapper     { display: flex; flex-direction: column; min-height: 100vh; }
        .header      { margin-bottom: 0; }
    </style>
</head>
<body>
<div class="wrapper">

    {{template "header"}}

    <div class="error-center">
        <div class="error-content" data-type="{{.ErrorType}}">
            <div class="error-code">{{.Code}}</div>
            <div class="error-title">{{.Title}}</div>
            <div class="error-desc">{{.Desc}}</div>

            <div class="error-actions">
                <a href="/" class="btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Create new paste
                </a>
                <a href="/" class="btn-ghost">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </a>
            </div>

            {{if .Detail}}
            <div class="error-detail">
                <div class="error-detail-label">Details</div>
                <div class="error-detail-text">{{.Detail}}</div>
            </div>
            {{end}}
        </div>
    </div>

</div>

<script nonce="{{.Nonce}}">
    {{template "theme-js"}}
</script>
</body>
</html>
