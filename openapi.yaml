openapi: 3.1.0
info:
  title: Padmark API
  description: |
    JSON API for creating, storing, and managing Markdown notes.

    ## Authentication

    Two independent mechanisms can gate access:

    - `--auth-tokens` (deprecated, superseded by `--enable-accounts`): write endpoints (`POST`,
      `PUT`, `DELETE`) require a Bearer token in the `Authorization` header.
    - `--enable-accounts`: TOTP-based user accounts with session cookies.

    Read endpoints (`GET`) are gated by each note's `privacy` level:

    - `public` (default): anyone can read it.
    - `authenticated`: **any** valid credential (a bearer token or an authenticated session) may
      read it — not just the note's creator.
    - `owner`: only the credential that created the note (see "Edit codes and ownership" below)
      may read it. Requires `--enable-accounts` and an authenticated session or API token at
      creation time — a request that would produce an ownerless note (anonymous, or under
      `--auth-tokens` alone, which has no notion of "owner") is rejected with `422` instead of
      silently creating a note nobody, including its creator, could ever read again.

    ## Burn-after-reading

    Notes can be configured to self-destruct after the first read:

    - **Without TTL** (`burn_after_reading: true`): the note is deleted the moment it is first read.
    - **With TTL** (`burn_after_reading: true, ttl: N`): the note stays accessible for *N* seconds
      after the first read, then expires.  The exact expiry timestamp is returned in `expires_at`.

    ## Edit codes and ownership

    Every note is created with a randomly generated 12-character `edit_code`.  It is returned
    **once** in the `CreateNoteResponse` and is never exposed again.  Store it — it is required
    for `PUT` and `DELETE`, **unless** the note was created while authenticated (a bearer token or
    a session): the exact same credential that created it may then edit or delete it without the
    `edit_code`. This owner check is strict — it never extends to other authenticated users or to
    admins, and it does not apply to notes created anonymously (no owner is recorded, so
    `edit_code` is always required for them, from everyone).
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: notes
    description: CRUD operations on notes
  - name: health
    description: Liveness and readiness probes

paths:
  /notes:
    post:
      operationId: createNote
      summary: Create a new note
      description: |
        Creates a note and returns it together with the one-time `edit_code`.
        If `slug` is omitted a 10-character random slug is generated.
        Responds `409 Conflict` when the requested slug is already taken.
      tags: [notes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Note created successfully
          headers:
            Location:
              description: Canonical URL of the created note (`/{id}`)
              schema:
                type: string
                example: /abcde12345
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNoteResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          description: A note with the requested slug already exists
          $ref: "#/components/responses/Error"
        "413":
          description: Request body exceeds the server limit (configurable, default 4 MB)
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /notes/{id}:
    get:
      operationId: getNote
      summary: Get a note by ID
      description: |
        Returns the note as JSON.  Increments the view counter on every call.

        For burn-after-reading notes **without TTL** the note is deleted on this request and
        the response body is the last snapshot of the note before deletion.

        For burn-after-reading notes **with TTL** `expires_at` is set on the first read to
        `now + ttl` and the note expires automatically when that timestamp is reached.
      tags: [notes]
      parameters:
        - $ref: "#/components/parameters/noteId"
      responses:
        "200":
          description: Note found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "401":
          description: |
            The note's privacy level requires a credential this request didn't supply — see the
            `privacy` field semantics above (`authenticated` or `owner`).
          $ref: "#/components/responses/Error"
        "404":
          description: Note not found
          $ref: "#/components/responses/Error"
        "410":
          description: Note has expired or was already consumed (burn-after-reading)
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

    put:
      operationId: updateNote
      summary: Update an existing note
      description: |
        Replaces the note's title, content, content type, and burn settings.
        The `edit_code` must match the one returned when the note was created — unless the
        request is authenticated (bearer token or session) as the exact user who created the
        note, in which case `edit_code` may be omitted. See "Edit codes and ownership" above.
        Returns the updated note.
      tags: [notes]
      parameters:
        - $ref: "#/components/parameters/noteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: Note updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Wrong edit code
          $ref: "#/components/responses/Error"
        "404":
          description: Note not found
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

    delete:
      operationId: deleteNote
      summary: Delete a note
      description: |
        Permanently deletes the note.  The edit code must be supplied either as the
        `X-Edit-Code` request header or the `edit_code` query parameter — unless the request is
        authenticated (bearer token or session) as the exact user who created the note, in which
        case no edit code is needed. See "Edit codes and ownership" above.

        Prefer the `X-Edit-Code` header over the `edit_code` query parameter: a query string can
        end up in reverse-proxy/CDN access logs or in the `Referer` header of a same-origin
        follow-up request, while padmark's own logging never records it (see openapi.yaml's
        `edit_code` query parameter description). The query parameter exists only for manual/curl
        convenience — the CLI always uses the header. Better still, sign in (session or API
        token) before creating the note and skip the edit code entirely.
      tags: [notes]
      parameters:
        - $ref: "#/components/parameters/noteId"
        - name: X-Edit-Code
          in: header
          description: Edit code returned at note creation (alternative to `edit_code` query param). Preferred over the query parameter — see the operation description.
          schema:
            type: string
        - name: edit_code
          in: query
          description: |
            Edit code returned at note creation (alternative to `X-Edit-Code` header). Prefer the
            header: a query string is more likely to be captured in proxy/CDN access logs or a
            same-origin `Referer` header. Provided for manual/curl convenience only.
          schema:
            type: string
      responses:
        "204":
          description: Note deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Wrong edit code
          $ref: "#/components/responses/Error"
        "404":
          description: Note not found
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 as long as the process is running.
      tags: [health]
      responses:
        "200":
          description: Service is alive

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe
      description: Returns 200 when the storage backend is reachable, 503 otherwise.
      tags: [health]
      responses:
        "200":
          description: Service is ready
        "503":
          description: Storage backend unreachable
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Static Bearer token configured via `--auth-tokens` / `PADMARK_AUTH_TOKENS`.
        Required for write operations when the server is started with tokens configured.

  parameters:
    noteId:
      name: id
      in: path
      required: true
      description: Note ID (slug) — 10-char random string or the custom slug chosen at creation
      schema:
        type: string
        example: abcde12345

  schemas:
    CreateNoteRequest:
      type: object
      required: [content]
      properties:
        title:
          type: string
          description: Human-readable title shown in the note header
          example: My snippet
        content:
          type: string
          description: Note body. Interpreted as Markdown unless `content_type` is `text/plain`
          example: "# Hello\n\nThis is **padmark**."
        content_type:
          type: string
          enum: ["text/markdown", "text/plain"]
          default: "text/markdown"
          description: MIME type of `content`; controls rendering on the view page
        slug:
          type: string
          description: |
            Custom URL-friendly identifier. Must match `[a-zA-Z0-9_-]+`.
            If omitted a 10-character random slug is generated.
            Returns `409` if the slug is already taken.
          example: my-snippet
        burn_after_reading:
          type: boolean
          default: false
          description: |
            When `true` the note self-destructs after the first read.
            If `ttl` is also provided the note is not deleted immediately but expires `ttl`
            seconds after the first read.
        ttl:
          type: integer
          format: int64
          description: |
            Grace period in seconds after the first read before the note expires.
            Only meaningful when `burn_after_reading` is `true`.
            `0` means the note is deleted immediately when it is first revealed.
            Omitted means the same as `0` (immediate burn after reading).
          example: 3600
        edit_code:
          type: string
          description: |
            Optional custom edit code. If omitted a random 12-character code is generated.
            Intended for CLI and automation use; the web UI does not expose this field.
          example: MySecretCode1

        privacy:
          type: string
          enum: ["public", "authenticated", "owner"]
          default: "public"
          description: |
            Who may read the note: `public` (anyone), `authenticated` (any valid bearer token or
            session, not just the creator), or `owner` (only the exact credential that created
            it — see "Edit codes and ownership" above). Meaningful when the server is started
            with `--auth-tokens` and/or `--enable-accounts`; `owner` additionally requires the
            note to actually have an owner, i.e. `--enable-accounts` and an authenticated caller
            — otherwise the request is rejected with `422`.

    UpdateNoteRequest:
      type: object
      required: [content]
      properties:
        title:
          type: string
          description: New title
          example: Updated title
        content:
          type: string
          description: New body
          example: "# Updated\n\nNew content."
        content_type:
          type: string
          enum: ["text/markdown", "text/plain"]
          description: New content type; defaults to the note's current type when omitted
        edit_code:
          type: string
          description: |
            The edit code returned when the note was created. May be omitted when the request is
            authenticated (bearer token or session) as the note's owner — see
            "Edit codes and ownership" above.
          example: JmNkn0LdjbMw
        burn_after_reading:
          type: boolean
          description: Update the burn-after-reading flag
        ttl:
          type: integer
          format: int64
          description: |
            New TTL in seconds (grace period after first read).
            Only meaningful when `burn_after_reading` is `true`.
            `0` means the note is deleted immediately when it is first revealed.
          example: 3600
        privacy:
          type: string
          enum: ["public", "authenticated", "owner"]
          description: |
            Update the privacy level. See `CreateNoteRequest.privacy` for the exact semantics of
            each value. Omitted keeps the note's current privacy level.

    NoteResponse:
      type: object
      required: [id, title, content, content_type, views, burn_after_reading, created_at, updated_at]
      properties:
        id:
          type: string
          description: Unique slug identifying the note
          example: abcde12345
        title:
          type: string
          description: Note title
          example: My snippet
        content:
          type: string
          description: Note body (Markdown or plain text depending on `content_type`)
        content_type:
          type: string
          enum: ["text/markdown", "text/plain"]
          description: MIME type of `content`
        views:
          type: integer
          description: Number of times the note has been fetched via GET
          example: 3
        burn_after_reading:
          type: boolean
          description: |
            `true` until the first read (or permanently `false` for non-burn notes).
            After the first read of a note with a TTL this becomes `false` and `expires_at`
            is set.
        privacy:
          type: string
          enum: ["public", "authenticated", "owner"]
          description: |
            Who may read the note. See `CreateNoteRequest.privacy` for the exact semantics of
            each value.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            ISO 8601 timestamp after which the note is inaccessible.
            Set on the first read for burn-after-reading notes that have a TTL.
            `null` for notes that are not expiring.
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (UTC)
        updated_at:
          type: string
          format: date-time
          description: Last-update timestamp (UTC)

    CreateNoteResponse:
      allOf:
        - $ref: "#/components/schemas/NoteResponse"
        - type: object
          required: [edit_code]
          properties:
            edit_code:
              type: string
              description: |
                One-time secret required for future `PUT` and `DELETE` requests.
                This is the only time `edit_code` is returned — store it securely.
              example: JmNkn0LdjbMw

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable error description
          example: note not found

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
